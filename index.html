<title>BESTPART GYM</title>

<style>
/* ══════════════════════════════════════════
   POKEMON PIXEL ART THEME
   ══════════════════════════════════════════ */
@font-face { font-family: 'PS2P'; src: local('Press Start 2P'); }

:root {
  --bg:     #1a1c2c;
  --bg2:    #252741;
  --bg3:    #12131e;
  --card:   #f0e8d0;
  --card2:  #e0d0b0;
  --card3:  #d8c8a0;
  --border: #181018;
  --red:    #CC0000;
  --red2:   #FF3333;
  --yellow: #FFD700;
  --blue:   #3860D0;
  --green:  #38A050;
  --purple: #9038F8;
  --orange: #F86030;
  --white:  #F8F8F0;
  --gray:   #888898;
  --hp-green:#00C830;
  --hp-yellow:#F8C800;
  --hp-red: #E82020;
  --gold:   #C8A020;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  height:100%;background:var(--bg);
  font-family:system-ui,-apple-system,sans-serif;
  color:var(--white);
  width:100%;
  overflow-x:hidden;
}

/* Starfield background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 12%,  rgba(255,255,255,.9) 100%,transparent),
    radial-gradient(1px 1px at 22% 35%, rgba(255,255,255,.7) 100%,transparent),
    radial-gradient(1px 1px at 38% 8%,  rgba(255,255,255,.8) 100%,transparent),
    radial-gradient(1px 1px at 55% 52%, rgba(255,255,255,.6) 100%,transparent),
    radial-gradient(1px 1px at 72% 18%, rgba(255,255,255,.9) 100%,transparent),
    radial-gradient(1px 1px at 88% 40%, rgba(255,255,255,.7) 100%,transparent),
    radial-gradient(1px 1px at 14% 68%, rgba(255,255,255,.8) 100%,transparent),
    radial-gradient(1px 1px at 31% 82%, rgba(255,255,255,.5) 100%,transparent),
    radial-gradient(1px 1px at 48% 75%, rgba(255,255,255,.9) 100%,transparent),
    radial-gradient(1px 1px at 64% 88%, rgba(255,255,255,.6) 100%,transparent),
    radial-gradient(1px 1px at 79% 62%, rgba(255,255,255,.8) 100%,transparent),
    radial-gradient(1px 1px at 93% 78%, rgba(255,255,255,.7) 100%,transparent),
    radial-gradient(2px 2px at 18% 25%, rgba(255,215,0,.8) 100%,transparent),
    radial-gradient(2px 2px at 60% 30%, rgba(255,215,0,.6) 100%,transparent),
    radial-gradient(2px 2px at 85% 15%, rgba(255,215,0,.8) 100%,transparent),
    radial-gradient(1px 1px at 5%  90%, rgba(255,255,255,.6) 100%,transparent),
    radial-gradient(1px 1px at 42% 95%, rgba(255,255,255,.8) 100%,transparent);
  background-size: 100% 100%;
  background-repeat: no-repeat;
}

.app{min-height:100vh;position:relative;z-index:1;padding-bottom:80px;}
.screen{padding-bottom:16px;}

/* ── PIXEL ART CARDS ─────────────────────── */
.px-card{
  background:var(--card);
  border:3px solid var(--border);
  box-shadow:4px 4px 0 var(--border);
  border-radius:4px;
  color:var(--border);
  position:relative;
}
.px-card::before{
  content:'';position:absolute;inset:2px;
  border-top:2px solid rgba(255,255,255,.6);
  border-left:2px solid rgba(255,255,255,.4);
  border-radius:2px;
  pointer-events:none;
}
.px-card-dark{
  background:var(--bg2);
  border:3px solid var(--border);
  box-shadow:4px 4px 0 var(--border);
  border-radius:4px;
  color:var(--white);
}

/* ── PIXEL BUTTONS ───────────────────────── */
.px-btn{
  font-family:'Press Start 2P',monospace;
  font-size:9px;
  border:3px solid var(--border);
  box-shadow:4px 4px 0 var(--border);
  cursor:pointer;padding:12px 16px;
  border-radius:4px;width:100%;
  transition:transform .08s,box-shadow .08s;
  line-height:1.8;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.px-btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--border);}
.px-btn-red{background:var(--red);color:#fff;}
.px-btn-red:hover{background:var(--red2);}
.px-btn-yellow{background:var(--yellow);color:var(--border);}
.px-btn-dark{background:var(--bg2);color:var(--white);}
.px-btn-green{background:var(--green);color:#fff;}
.px-btn-light{background:var(--card2);color:var(--border);}
.px-btn-blue{background:var(--blue);color:#fff;}

/* ── PIXEL INPUT ─────────────────────────── */
input,select,textarea{
  width:100%;padding:10px 12px;
  border:3px solid var(--border);
  border-radius:4px;font-size:13px;
  outline:none;background:var(--white);
  font-family:system-ui,sans-serif;
  color:var(--border);
  box-shadow:inset 2px 2px 0 rgba(0,0,0,.15);
  box-sizing:border-box;
  max-width:100%;min-width:0;
}
input[type="datetime-local"]{
  -webkit-appearance:none;
  appearance:none;
  width:100%;max-width:100%;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--blue);
  box-shadow:inset 2px 2px 0 rgba(0,0,100,.1);
}
.field-label{
  font-family:'Press Start 2P',monospace;
  font-size:7px;color:var(--gray);
  display:block;margin-bottom:4px;margin-top:10px;
  letter-spacing:.5px;
}

/* ── HP BAR ──────────────────────────────── */
.hp-bar-outer{
  background:#282828;border:2px solid var(--border);
  height:12px;border-radius:2px;overflow:hidden;
  position:relative;
}
.hp-bar-inner{height:100%;border-radius:1px;transition:width .5s;}
.hp-bar-inner.high{background:var(--hp-green);}
.hp-bar-inner.mid{background:var(--hp-yellow);}
.hp-bar-inner.low{background:var(--hp-red);animation:hp-blink 1s infinite;}
@keyframes hp-blink{0%,100%{opacity:1;}50%{opacity:.5};}
.hp-label{
  font-family:'Press Start 2P',monospace;font-size:6px;
  color:var(--border);margin-bottom:3px;letter-spacing:.5px;
}

/* ── TYPE BADGES ─────────────────────────── */
.type-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:3px;
  font-family:'Press Start 2P',monospace;font-size:7px;
  border:2px solid rgba(0,0,0,.3);letter-spacing:.3px;
  text-transform:uppercase;
}

/* ── TOP BAR ─────────────────────────────── */
.top-bar{
  display:flex;align-items:center;gap:8px;
  padding:14px 16px 6px;
  border-bottom:2px solid rgba(255,255,255,.05);
}
.top-bar-title{
  flex:1;font-family:'Press Start 2P',monospace;
  font-size:13px;color:var(--yellow);
  text-shadow:2px 2px 0 var(--border);
  letter-spacing:.5px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.icon-btn{
  background:var(--bg2);border:2px solid rgba(255,255,255,.1);
  color:var(--white);font-size:18px;cursor:pointer;
  width:34px;height:34px;display:flex;align-items:center;
  justify-content:center;border-radius:4px;flex-shrink:0;
}
.fab{
  background:var(--red);border:3px solid var(--border);
  box-shadow:3px 3px 0 var(--border);color:#fff;
  width:34px;height:34px;border-radius:4px;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;flex-shrink:0;
  transition:transform .08s,box-shadow .08s;
}
.fab:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--border);}

/* ── BOTTOM NAV ──────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;
  width:100%;
  background:var(--bg3);
  border-top:3px solid var(--border);
  display:flex;justify-content:space-around;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;cursor:pointer;padding:4px 6px;
  color:var(--gray);
  font-family:'Press Start 2P',monospace;font-size:8px;
  letter-spacing:.3px;transition:color .15s;
  min-width:48px;
}
.nav-item.active{color:var(--yellow);}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 4px var(--yellow));}
.nav-icon{font-size:23px;line-height:1;}

/* ── DIALOG BOX ──────────────────────────── */
.dialog-box{
  background:var(--card);border:4px solid var(--border);
  box-shadow:5px 5px 0 var(--border);border-radius:4px;
  padding:14px;color:var(--border);
  font-size:12px;line-height:1.6;
  position:relative;
}
.dialog-box::after{
  content:'▼';position:absolute;bottom:8px;right:12px;
  font-size:8px;color:var(--border);animation:blink .8s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0};}

/* ── JOB CARD ────────────────────────────── */
.job-card{
  background:var(--card);border:3px solid var(--border);
  box-shadow:4px 4px 0 var(--border);border-radius:4px;
  padding:12px;margin-bottom:12px;cursor:pointer;
  transition:transform .08s,box-shadow .08s;
  color:var(--border);
}
.job-card:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--border);}

/* ── MODAL SHEET ─────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;display:flex;align-items:flex-end;
  width:100%;
}
.modal-sheet{
  background:var(--card);border:3px solid var(--border);
  border-bottom:none;border-radius:8px 8px 0 0;
  padding:20px 16px calc(24px + env(safe-area-inset-bottom));
  width:100%;max-height:92vh;overflow-y:auto;color:var(--border);
}
.modal-title{
  font-family:'Press Start 2P',monospace;font-size:13px;
  color:var(--border);margin-bottom:16px;
  text-align:center;letter-spacing:.5px;
}

/* ── SECTION TITLE ───────────────────────── */
.sec-title{
  font-family:'Press Start 2P',monospace;font-size:10px;
  color:var(--yellow);text-shadow:1px 1px 0 var(--border);
  letter-spacing:.5px;margin-bottom:10px;
}

/* ── PROGRESS GRID ───────────────────────── */
.kpi-card{
  background:var(--bg2);border:3px solid var(--border);
  box-shadow:3px 3px 0 var(--border);border-radius:4px;
  padding:12px;
}
.kpi-label{
  font-family:'Press Start 2P',monospace;font-size:8px;
  color:var(--gray);margin-bottom:6px;letter-spacing:.3px;
}
.kpi-value{
  font-family:'Press Start 2P',monospace;font-size:14px;
  color:var(--yellow);text-shadow:1px 1px 0 rgba(0,0,0,.5);
}
.kpi-sub{font-size:11px;color:var(--gray);margin-top:3px;}

/* ── PILL FILTER ─────────────────────────── */
.pill{
  padding:5px 10px;border-radius:3px;
  border:2px solid var(--border);font-size:11px;
  cursor:pointer;white-space:nowrap;
  font-family:system-ui,sans-serif;
  transition:transform .08s;
}
.pill:active{transform:scale(.96);}
.pill-active{background:var(--red);color:#fff;border-color:var(--border);}
.pill-inactive{background:var(--bg2);color:var(--gray);border-color:rgba(255,255,255,.1);}

/* ── LOGIN SCREEN ────────────────────────── */
.login-bg{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  position:relative;z-index:1;
}
.pokeball-anim{animation:pokeball-spin 3s linear infinite;}
@keyframes pokeball-spin{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.1);}
  100%{transform:rotate(360deg) scale(1);}
}
.press-start{
  font-family:'Press Start 2P',monospace;font-size:9px;
  color:var(--yellow);text-align:center;
  animation:blink 1s infinite;margin-bottom:32px;
}

/* ── GRID UTILS ──────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.row{display:flex;align-items:center;}
.row-bet{display:flex;align-items:center;justify-content:space-between;}
.col{display:flex;flex-direction:column;}
.pill-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}

/* ── SCROLL ──────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── CALENDAR CELL ───────────────────────── */
.cal-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:3px;cursor:pointer;font-size:12px;
  border:2px solid transparent;font-weight:600;
  transition:transform .08s;
}
.cal-cell:active{transform:scale(.9);}

/* ── PRINT ───────────────────────────────── */
@media print{
  .bottom-nav,.no-print,.px-btn,.fab,.icon-btn{display:none!important;}
  body{background:white;color:black;max-width:100%;}
  .px-card{border:1px solid #ccc;box-shadow:none;}
  body::before{display:none;}
  #printable{color:black!important;}
}

/* ── SAFE AREA ───────────────────────────── */
.app{padding-bottom:calc(80px + env(safe-area-inset-bottom));}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ══════════════════════════════════════════
   CONSTANTS
   ══════════════════════════════════════════ */
const POKE_TYPES={
  B2C:{color:'#F0A000', bg:'#FFFDE0', name:'บุคคล',  desc:'ไม่หักภาษี ณ ที่จ่าย', pokemon:'pikachu'},
  B2B:{color:'#F08030', bg:'#FFF0E0', name:'บริษัท', desc:'หักภาษี ณ ที่จ่าย 3%',  pokemon:'charmander'},
};
const JOB_TYPES=['Wedding','Pre-wedding','Corporate Event','Portrait','Product','Studio','Events','อื่นๆ'];
const TH_M=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const TH_MS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const EN_M=['January','February','March','April','May','June','July','August','September','October','November','December'];
const EN_MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const VAT=.07,WHT=.03;

/* ══════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════ */
const fc=n=>'฿'+(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0});
const fd=d=>{if(!d)return'';const t=new Date(d);return`${t.getDate()} ${TH_MS[t.getMonth()]} ${t.getFullYear()+543}`;};
const fdk=d=>{if(!d)return'';const t=new Date(d);return`${t.getDate()} ${TH_M[t.getMonth()]} ${t.getFullYear()+543}`;};
const gid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,5);
const shortK=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':String(n);

/* localStorage hook — ใช้สำหรับ settings เท่านั้น */
function useLS(key,init){
  const[val,set]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  const setter=useCallback(v=>{set(p=>{const n=typeof v==='function'?v(p):v;localStorage.setItem(key,JSON.stringify(n));return n;});},[key]);
  return[val,setter];
}

/* Firestore hook — sync ข้อมูลแบบ real-time per-user */
function useFirestore(uid,collName,init){
  const initRef=useRef(init);
  const[val,setVal]=useState(uid?[]:init);
  const valRef=useRef(val);
  valRef.current=val;

  useEffect(()=>{
    if(!uid||!window.__db){setVal(initRef.current);return;}
    const col=window.__db.collection('users').doc(uid).collection(collName);
    const unsub=col.onSnapshot(snap=>{
      setVal(snap.docs.map(d=>({...d.data(),id:d.id})));
    },err=>console.error('Firestore:',err));
    return()=>unsub();
  },[uid,collName]);

  const setter=useCallback((v)=>{
    const prev=valRef.current;
    const next=typeof v==='function'?v(prev):v;
    setVal(next);
    if(!uid||!window.__db)return;
    const col=window.__db.collection('users').doc(uid).collection(collName);
    const prevMap=new Map(prev.map(x=>[x.id,x]));
    const nextMap=new Map(next.map(x=>[x.id,x]));
    prev.forEach(item=>{if(!nextMap.has(item.id))col.doc(item.id).delete().catch(console.error);});
    next.forEach(item=>{
      const old=prevMap.get(item.id);
      if(!old||JSON.stringify(old)!==JSON.stringify(item))col.doc(item.id).set(item).catch(console.error);
    });
  },[uid,collName]);

  return[val,setter];
}

/* ══════════════════════════════════════════
   GOOGLE CALENDAR API
   ══════════════════════════════════════════ */
async function calendarCreateEvent(accessToken,job){
  try{
    const event={
      summary:`${job.customerName}${job.location?' · '+job.location:''}${job.date?' · '+job.date:''}`,
      location:job.location||'',
      description:`ประเภท: ${job.jobType}\nราคา: ${fc(job.totalAmount)}${job.notes?'\n'+job.notes:''}`,
      start:{date:job.date},
      end:{date:job.date},
      colorId:'11',
      reminders:{useDefault:false,overrides:[{method:'popup',minutes:1440}]},
    };
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',
      headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(event),
    });
    if(r.ok){const d=await r.json();return d.id;}
    return null;
  }catch{return null;}
}

async function calendarDeleteEvent(accessToken,eventId){
  try{
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${eventId}`,{
      method:'DELETE',
      headers:{'Authorization':`Bearer ${accessToken}`},
    });
  }catch{}
}

function JobsList({jobs,payments,setJobs,customers,accessToken,onNav}){

    customerType:'B2C',customerId:'',customerName:'',
    jobType:'Wedding',date:new Date().toISOString().slice(0,10),

  });
  const[editForm,setEditForm]=useState({customerType:'B2C',customerName:'',jobType:'Wedding',date:'',location:'',totalAmount:'',notes:''});

  const startEdit=(job)=>{
    setEditingJob(job);
    setEditForm({customerType:job.customerType,customerName:job.customerName,jobType:job.jobType,date:job.date,location:job.location||'',totalAmount:String(job.totalAmount),notes:job.notes||''});
  };
  const saveEdit=async()=>{
    if(!editForm.customerName||!editForm.totalAmount)return;
    setEditSyncing(true);
    const updated={...editingJob,...editForm,totalAmount:parseFloat(editForm.totalAmount)||0};
    if(editingJob.calEventId&&accessToken){
      await calendarDeleteEvent(accessToken,editingJob.calEventId);
      const eid=await calendarCreateEvent(accessToken,updated);
      updated.calEventId=eid||null;
    }
    setJobs(p=>p.map(j=>j.id===editingJob.id?updated:j));

    const ok=j.customerName.toLowerCase().includes(search.toLowerCase())||j.jobType.toLowerCase().includes(search.toLowerCase());

      location:form.location,totalAmount:parseFloat(form.totalAmount)||0,
      status:'active',notes:form.notes,calEventId:null,

    // Sync to Google Calendar if requested
    if(form.syncCal&&accessToken){
      const eid=await calendarCreateEvent(accessToken,newJob);
      if(eid)newJob.calEventId=eid;
    }
    setJobs(p=>[...p,newJob]);
    setSyncing(false);setShowAdd(false);
    setForm({customerType:'B2C',customerId:'',customerName:'',jobType:'Wedding',date:new Date().toISOString().slice(0,10),location:'',totalAmount:'',notes:'',syncCal:false});

        <div className="pill-row" style={{marginBottom:12}}>
          {[['all','ทั้งหมด'],['active','กำลังทำ'],['completed','เสร็จแล้ว']].map(([k,l])=>(
            <button key={k} className={`pill ${filter===k?'pill-active':'pill-inactive'}`} onClick={()=>setFilter(k)}>{l}</button>
          ))}
        </div>
        {filtered.map(job=>{
          const paid=payments.filter(x=>x.jobId===job.id).reduce((a,x)=>a+x.amount,0);
          const rem=job.totalAmount-paid;
          const pct=job.totalAmount>0?Math.min(100,paid/job.totalAmount*100):0;
          return(
            <div key={job.id} className="job-card" onClick={()=>onNav('jobDetail',job)}>
              <div className="row-bet" style={{marginBottom:6}}>
                <div className="row" style={{gap:6,flexWrap:'wrap'}}>

/* ══════════════════════════════════════════
   JOB DETAIL
   ══════════════════════════════════════════ */
function JobDetail({job,jobs,setJobs,payments,setPayments,quotes,setQuotes,customers,accessToken,onBack,onNav}){
  const[showPay,setShowPay]=useState(false);
  const[showQuote,setShowQuote]=useState(false);
  const[payAmt,setPayAmt]=useState('');
  const[payNote,setPayNote]=useState('มัดจำ');
  const[syncing,setSyncing]=useState(false);
  if(!job)return null;

  const jPay=payments.filter(p=>p.jobId===job.id);
  const paid=jPay.reduce((s,p)=>s+p.amount,0);
  const rem=job.totalAmount-paid;
  const pct=job.totalAmount>0?Math.min(100,paid/job.totalAmount*100):0;
  const jQuotes=quotes.filter(q=>q.jobId===job.id);
  const liveJob=jobs.find(j=>j.id===job.id)||job;

  const addPay=()=>{
    if(!payAmt)return;
    const amt=parseFloat(payAmt);
    setPayments(p=>[...p,{id:gid(),jobId:job.id,amount:amt,date:new Date().toISOString().slice(0,10),note:payNote}]);
    if(paid+amt>=job.totalAmount)setJobs(p=>p.map(j=>j.id===job.id?{...j,status:'completed'}:j));
    setPayAmt('');setPayNote('มัดจำ');setShowPay(false);
  };

  const syncToCalendar=async()=>{
    if(!accessToken)return;
    setSyncing(true);
    if(liveJob.calEventId)await calendarDeleteEvent(accessToken,liveJob.calEventId);
    const eid=await calendarCreateEvent(accessToken,liveJob);
    setJobs(p=>p.map(j=>j.id===job.id?{...j,calEventId:eid}:j));
    setSyncing(false);
  };
  const removeFromCalendar=async()=>{
    if(!accessToken||!liveJob.calEventId)return;
    setSyncing(true);
    await calendarDeleteEvent(accessToken,liveJob.calEventId);
    setJobs(p=>p.map(j=>j.id===job.id?{...j,calEventId:null}:j));
    setSyncing(false);
  };
  const deleteJob=()=>{
    if(!confirm('ลบ Quest นี้?'))return;
    if(liveJob.calEventId&&accessToken)calendarDeleteEvent(accessToken,liveJob.calEventId);
    setJobs(p=>p.filter(j=>j.id!==job.id));
    setPayments(p=>p.filter(x=>x.jobId!==job.id));
    setQuotes(p=>p.filter(x=>x.jobId!==job.id));
    onBack();
  };

  return(
    <div className="screen">
      <TopBar title={job.customerName.split(' ')[0].toUpperCase()} onBack={onBack}
        right={<button className="icon-btn" onClick={deleteJob} style={{fontSize:16}}>🗑</button>}/>
      <div style={{padding:'0 16px'}}>
        {/* Info */}
        <div className="px-card" style={{marginBottom:12,padding:14}}>
          <div className="row-bet" style={{marginBottom:10}}>
            <TypeBadge type={job.customerType}/>
            <span style={{fontSize:12,color:'#888'}}>{fd(job.date)}</span>
          </div>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:12,color:'#181018',marginBottom:4}}>{job.jobType}</div>
          {job.location&&<div style={{color:'#888',fontSize:13,marginBottom:12}}>📍 {job.location}</div>}
          <div className="row-bet" style={{marginBottom:6}}>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'#555'}}>HP BAR · {Math.round(pct)}%</span>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'#181018'}}>{fc(job.totalAmount)}</span>
          </div>
          <HpBar paid={paid} total={job.totalAmount} showLabel={false}/>
          <div className="row-bet" style={{marginTop:6}}>
            <span style={{fontSize:12,color:'#888'}}>ชำระแล้ว {fc(paid)}</span>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:rem>0?'#E82020':'#00C830'}}>
              {rem>0?`-${fc(rem)}`:'✓ FULL'}
            </span>
          </div>
        </div>

        {/* Google Calendar sync */}
        {accessToken&&(
          <div style={{marginBottom:12}}>
            {liveJob.calEventId?(
              <button className="px-btn" style={{background:'#EBF3FF',border:'3px solid #3860D0',boxShadow:'3px 3px 0 #3860D0',color:'#3860D0',fontSize:8}}
                onClick={removeFromCalendar}>{syncing?'..':'📅 ✓ SYNCED TO CALENDAR · ลบออก'}</button>
            ):(
              <button className="px-btn px-btn-blue" style={{fontSize:8}} onClick={syncToCalendar}>
                {syncing?'SYNCING..':'📅 ADD TO GOOGLE CALENDAR'}
              </button>
            )}
          </div>
        )}

        {/* Actions */}
        <div className="g2" style={{marginBottom:12}}>
          {rem>0&&<button className="px-btn px-btn-green" style={{fontSize:9}} onClick={()=>setShowPay(true)}>💰 รับเงิน</button>}
          <button className="px-btn px-btn-dark" style={{fontSize:8}} onClick={()=>setShowQuote(true)}>📜 ใบเสนอ</button>
        </div>

        {/* Pay form */}
        {showPay&&(
          <div className="px-card" style={{marginBottom:12,padding:14,border:'3px solid #00C830',boxShadow:'4px 4px 0 #00C830'}}>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'#181018',marginBottom:10}}>💰 รับเงิน</div>
            <input type="number" placeholder={`จำนวน (ค้าง ${fc(rem)})`} value={payAmt} onChange={e=>setPayAmt(e.target.value)} style={{marginBottom:8}}/>
            <select value={payNote} onChange={e=>setPayNote(e.target.value)} style={{marginBottom:10}}>
              {['มัดจำ','ชำระส่วนที่เหลือ','เงินสด','โอนเงิน','อื่นๆ'].map(v=><option key={v}>{v}</option>)}
            </select>
            <div style={{display:'flex',gap:8}}>
              <button className="px-btn px-btn-green" onClick={addPay} style={{flex:2,fontSize:9}}>✓ SAVE</button>
              <button className="px-btn px-btn-light" onClick={()=>setShowPay(false)} style={{flex:1,fontSize:9}}>✕</button>
            </div>
          </div>
        )}

        {/* Quote form */}
        {showQuote&&<QuoteForm job={job} setQuotes={setQuotes} onClose={()=>setShowQuote(false)} onView={q=>{setShowQuote(false);onNav('quoteDetail',q);}}/>}

        {/* Quotes */}
        {jQuotes.length>0&&(
          <div className="px-card" style={{marginBottom:12,padding:14}}>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#181018',marginBottom:10}}>📜 ใบเสนอราคา</div>
            {jQuotes.map(q=>{
              const sub=q.items.reduce((s,i)=>s+i.amount,0);
              const net=sub+(q.useVat?sub*VAT:0)-(q.useWht?sub*WHT:0);
              return(
                <div key={q.id} onClick={()=>onNav('quoteDetail',q)}
                  style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #d8c8a0',cursor:'pointer'}}>
                  <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#555'}}>QT-{q.id.slice(-6).toUpperCase()}</span>
                  <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'#38A050'}}>{fc(net)}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* Payment history */}
        <div className="px-card" style={{padding:14}}>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#181018',marginBottom:10}}>PAYMENT LOG</div>
          {jPay.length===0&&<div style={{color:'#aaa',fontSize:13}}>ยังไม่มีการรับเงิน</div>}
          {jPay.map(p=>(
            <div key={p.id} className="row-bet" style={{padding:'8px 0',borderBottom:'1px solid #d8c8a0'}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{p.note}</div>
                <div style={{color:'#888',fontSize:11}}>{fd(p.date)}</div>
              </div>
              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'#38A050'}}>+{fc(p.amount)}</div>
            </div>
          ))}
          {rem>0&&(
            <div className="row-bet" style={{padding:'8px 0',color:'#aaa',fontSize:12}}>
              <span>รอยอดคงเหลือ...</span><span>—</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   QUOTE FORM
   ══════════════════════════════════════════ */
function QuoteForm({job,setQuotes,onClose,onView}){
  const pt=POKE_TYPES[job.customerType]||POKE_TYPES.B2C;
  const[items,setItems]=useState([{desc:'',amount:''}]);
  const[useVat,setUseVat]=useState(job.customerType==='B2B');
  const[useWht,setUseWht]=useState(job.customerType==='B2B');
  const sub=items.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const vat=useVat?sub*VAT:0;
  const total=sub+vat;
  const wht=useWht?sub*WHT:0;
  const net=total-wht;

  const save=()=>{
    const q={id:gid(),jobId:job.id,customerId:job.customerId,customerName:job.customerName,customerType:job.customerType,
      date:new Date().toISOString().slice(0,10),items:items.filter(i=>i.desc||i.amount).map(i=>({desc:i.desc,amount:parseFloat(i.amount)||0})),useVat,useWht};
    setQuotes(p=>[...p,q]);onView(q);
  };

  return(
    <div className="px-card" style={{marginBottom:12,padding:14,border:'3px solid #3860D0',boxShadow:'4px 4px 0 #3860D0'}}>
      <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'#181018',marginBottom:12}}>📜 ITEM SHOP</div>
      {items.map((item,i)=>(
        <div key={i} style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
          <input style={{flex:2}} placeholder={`รายการ ${i+1}`} value={item.desc} onChange={e=>setItems(p=>p.map((x,j)=>j===i?{...x,desc:e.target.value}:x))}/>
          <input style={{flex:1}} type="number" placeholder="฿" value={item.amount} onChange={e=>setItems(p=>p.map((x,j)=>j===i?{...x,amount:e.target.value}:x))}/>
          {items.length>1&&<button onClick={()=>setItems(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#E82020',cursor:'pointer',fontSize:18}}>×</button>}
        </div>
      ))}
      <button onClick={()=>setItems(p=>[...p,{desc:'',amount:''}])} style={{color:'#3860D0',background:'none',border:'none',cursor:'pointer',fontFamily:"'Press Start 2P',monospace",fontSize:7,marginBottom:10}}>+ ADD ITEM</button>
      <div style={{display:'flex',gap:20,marginBottom:10}}>
        {[['useVat','VAT 7%'],[,'useWht','WHT 3%']].map(([k,l])=>k&&(
          <label key={k} style={{display:'flex',gap:6,alignItems:'center',color:'#181018',fontSize:13,cursor:'pointer'}}>
            <input type="checkbox" checked={k==='useVat'?useVat:useWht} onChange={e=>k==='useVat'?setUseVat(e.target.checked):setUseWht(e.target.checked)}/> {l}
          </label>
        ))}
        <label style={{display:'flex',gap:6,alignItems:'center',color:'#181018',fontSize:13,cursor:'pointer'}}>
          <input type="checkbox" checked={useVat} onChange={e=>setUseVat(e.target.checked)}/> VAT 7%
        </label>
        <label style={{display:'flex',gap:6,alignItems:'center',color:'#181018',fontSize:13,cursor:'pointer'}}>
          <input type="checkbox" checked={useWht} onChange={e=>setUseWht(e.target.checked)}/> WHT 3%
        </label>
      </div>
      {/* Summary */}
      <div style={{background:'#e8d8b0',borderRadius:4,padding:10,marginBottom:10,border:'2px solid #c8a020'}}>
        {[['รวม',fc(sub),'#181018'],[useVat&&'VAT 7%',useVat&&fc(vat),'#888'],[useVat&&'ยอดเรียกเก็บ',useVat&&fc(total),'#181018'],[useWht&&'- WHT 3%',useWht&&`-${fc(wht)}`,'#E82020'],['✓ สุทธิ',fc(net),'#38A050']].filter(r=>r[0]).map(([l,v,c])=>(
          <div key={l} className="row-bet" style={{marginBottom:4,fontSize:13}}>
            <span style={{color:'#555'}}>{l}</span>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:c}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="px-btn px-btn-red" onClick={save} style={{flex:2,fontSize:8}}>✓ CREATE</button>
        <button className="px-btn px-btn-light" onClick={onClose} style={{flex:1,fontSize:8}}>✕</button>
      </div>
    </div>
  );
}

  const vat=quote.useVat?sub*VAT:0;
  const total=sub+vat;
  const wht=quote.useWht?sub*WHT:0;
  const net=total-wht;
  const docTitle=quote.useVat?'ใบกำกับภาษี':'ใบเสนอราคา';

  return(
    <div className="screen">
      <TopBar title={docTitle.toUpperCase()} onBack={onBack}/>
      <div className="no-print" style={{padding:'0 16px 12px',display:'flex',gap:8}}>
        <button className="px-btn px-btn-red" onClick={()=>window.print()} style={{flex:1,fontSize:8}}>🖨️ PRINT/PDF</button>
        <button className="px-btn px-btn-blue" style={{flex:1,fontSize:8}}>📱 LINE</button>
      </div>
      <div id="printable" className="px-card" style={{margin:'0 16px',padding:16}}>
        <div className="row-bet" style={{marginBottom:16}}>
          <div>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:10,color:'#181018'}}>Pixory Studio</div>
            <div style={{fontSize:11,color:'#888',marginTop:4}}>เลขผู้เสียภาษี 0000000000000</div>

/* ══════════════════════════════════════════
   CALENDAR  (+ Google Calendar events)
   ══════════════════════════════════════════ */
function CalendarView({jobs,setJobs,accessToken,onNav}){
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const[sel,setSel]=useState(null);
  const[gcalEvents,setGcalEvents]=useState([]);
  const[gcalLoading,setGcalLoading]=useState(false);
  const[showGcal,setShowGcal]=useState(true);

  const deleteJob=async(job)=>{
    if(!confirm('ลบ Quest นี้?'))return;
    if(job.calEventId&&accessToken)await calendarDeleteEvent(accessToken,job.calEventId);
    setJobs(p=>p.filter(j=>j.id!==job.id));
  };

  /* ── ดึง Google Calendar events เมื่อเดือนเปลี่ยน ── */
  useEffect(()=>{
    if(!accessToken||!showGcal){setGcalEvents([]);return;}
    setGcalLoading(true);
    const start=new Date(yr,mo,1).toISOString();
    const end=new Date(yr,mo+1,0,23,59,59).toISOString();
    fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(start)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=100`,{
      headers:{Authorization:`Bearer ${accessToken}`}
    })
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(data=>{
      const evts=(data.items||[]).map(e=>({
        id:'gcal_'+e.id,
        title:e.summary||'(ไม่มีชื่อ)',
        date:(e.start?.date||e.start?.dateTime||'').slice(0,10),
        time:e.start?.dateTime?new Date(e.start.dateTime).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):'',
        location:e.location||'',
        color:e.colorId?['#CC0000','#E67E22','#F1C40F','#27AE60','#3498DB','#9B59B6','#1ABC9C','#E74C3C','#8E44AD','#2980B9','#16A085','#C0392B'][parseInt(e.colorId)-1]||'#3860D0':'#3860D0',
        isGcal:true,
      }));
      setGcalEvents(evts);
    })
    .catch(err=>{console.warn('Google Calendar:',err);setGcalEvents([]);})
    .finally(()=>setGcalLoading(false));
  },[yr,mo,accessToken,showGcal]);

  /* ── จัดกลุ่ม jobs + gcal events ตามวัน ── */
  const first=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const byDay={};
  jobs.forEach(j=>{
    const d=new Date(j.date);
    if(d.getFullYear()===yr&&d.getMonth()===mo){
      const k=d.getDate();if(!byDay[k])byDay[k]={jobs:[],gcal:[]};
      byDay[k].jobs.push(j);
    }
  });
  gcalEvents.forEach(e=>{
    if(!e.date)return;
    const d=new Date(e.date+'T00:00:00');
    if(d.getFullYear()===yr&&d.getMonth()===mo){
      const k=d.getDate();if(!byDay[k])byDay[k]={jobs:[],gcal:[]};
      byDay[k].gcal.push(e);
    }
  });

  const selData=sel?byDay[sel]||{jobs:[],gcal:[]}:{jobs:[],gcal:[]};
  const selTotal=(selData.jobs.length)+(selData.gcal.length);

  const prev=()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);setSel(null);};
  const next=()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);setSel(null);};

  const cellStyle=(d)=>{
    const day=byDay[d]||{jobs:[],gcal:[]};
    const cntJob=day.jobs.length;const cntGcal=day.gcal.length;
    const cnt=cntJob+cntGcal;
    const isToday=now.getDate()===d&&now.getMonth()===mo&&now.getFullYear()===yr;
    const isSel=sel===d;
    if(isSel)return{background:'#CC0000',color:'#fff',border:'2px solid #181018'};
    if(isToday)return{background:'transparent',color:'#FFD700',border:'2px solid #FFD700'};
    if(cntJob>=2)return{background:'#8B1A00',color:'#fff',border:'2px solid #181018'};
    if(cntJob===1&&cntGcal>0)return{background:'#CC0000',color:'#fff',border:'2px solid #181018'};
    if(cntJob===1)return{background:'#FFD0BC',color:'#181018',border:'2px solid #C8A020'};
    if(cntGcal>0)return{background:'#1a3a6a',color:'#6af',border:'2px solid #3860D0'};
    return{background:'transparent',color:'#888',border:'2px solid transparent'};
  };

  const hasDots=(d)=>{
    const day=byDay[d]||{jobs:[],gcal:[]};
    return day.jobs.length>0||day.gcal.length>0;
  };

  return(
    <div className="screen">
      <div style={{padding:'14px 16px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <span className="sec-title" style={{margin:0}}>📅 BATTLE MAP</span>
          <div style={{fontSize:10,color:'#aaa',marginTop:2,fontFamily:'system-ui,sans-serif'}}>ตารางงาน</div>
        </div>
        <div className="row" style={{gap:6}}>
          {/* Toggle Google Calendar */}
          {accessToken&&(
            <button onClick={()=>setShowGcal(s=>!s)} style={{background:showGcal?'#1a3a6a':'var(--bg2)',border:`2px solid ${showGcal?'#3860D0':'rgba(255,255,255,.1)'}`,color:showGcal?'#6af':'#888',fontFamily:"'Press Start 2P',monospace",fontSize:6,padding:'4px 6px',borderRadius:3,cursor:'pointer',letterSpacing:.3}}>
              {gcalLoading?'..':showGcal?'📅 ON':'📅 OFF'}
            </button>
          )}
          <button onClick={prev} className="icon-btn" style={{width:28,height:28,fontSize:14}}>‹</button>
          <div style={{textAlign:'center',minWidth:110}}>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#FFD700'}}>{EN_MS[mo]} {yr}</div>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:'#888',marginTop:3}}>{TH_M[mo]} พ.ศ. {yr+543}</div>
          </div>
          <button onClick={next} className="icon-btn" style={{width:28,height:28,fontSize:14}}>›</button>
        </div>
      </div>

      <div className="px-card" style={{margin:'0 16px',padding:14}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',textAlign:'center',marginBottom:6}}>
          {['อา','จ','อ','พ','พฤ','ศ','ส'].map(d=><div key={d} style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,color:'#888'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
          {Array(first).fill(null).map((_,i)=><div key={`e${i}`}/>)}
          {Array(dim).fill(null).map((_,i)=>{
            const d=i+1;
            return(
              <div key={d} className="cal-cell" style={{...cellStyle(d),flexDirection:'column',gap:1,fontSize:hasDots(d)?10:12,fontFamily:hasDots(d)?"'Press Start 2P',monospace":'inherit',fontWeight:hasDots(d)?700:400}}
                onClick={()=>setSel(d===sel?null:d)}>
                {d}
                {/* dot indicators */}
                {byDay[d]&&(
                  <div style={{display:'flex',gap:2,justifyContent:'center'}}>
                    {byDay[d].jobs.length>0&&<div style={{width:4,height:4,borderRadius:'50%',background:'#FFD700'}}/>}
                    {byDay[d].gcal.length>0&&<div style={{width:4,height:4,borderRadius:'50%',background:'#6af'}}/>}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{display:'flex',flexWrap:'wrap',gap:10,marginTop:10}}>
          <span style={{display:'flex',alignItems:'center',gap:4,fontFamily:"'Press Start 2P',monospace",fontSize:6,color:'#888'}}>
            <span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'#FFD0BC',border:'1px solid #C8A020'}}/>งานในแอป
          </span>
          {accessToken&&showGcal&&(
            <span style={{display:'flex',alignItems:'center',gap:4,fontFamily:"'Press Start 2P',monospace",fontSize:6,color:'#888'}}>
              <span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'#1a3a6a',border:'1px solid #3860D0'}}/>Google Cal
            </span>
          )}
          {!accessToken&&(
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,color:'#555'}}>Login เพื่อดู Google Calendar</span>
          )}
        </div>
      </div>

      {/* วันที่เลือก */}
      {sel&&(
        <div style={{padding:'12px 16px 0'}}>
          <div className="px-card" style={{padding:14}}>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#181018',marginBottom:10}}>
              📌 {sel} {TH_M[mo]} · {selTotal} รายการ
            </div>

            {selTotal===0&&<div style={{color:'#aaa',fontSize:13}}>ว่างครับ ☀️</div>}

            {/* Jobs ในแอป */}
            {selData.jobs.map(j=>(
              <div key={j.id} style={{padding:'10px 0',borderBottom:'1px solid #d8c8a0'}}>
                <div className="row-bet" style={{marginBottom:2}}>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,background:'#FFD700',color:'#181018',padding:'2px 5px',borderRadius:2}}>งาน</span>
                    <TypeBadge type={j.customerType}/>
                  </div>
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'#CC0000'}}>{fc(j.totalAmount)}</div>
                    <button onClick={()=>onNav('jobDetail',j)} title="แก้ไข" style={{background:'#EBF3FF',border:'2px solid #3860D0',borderRadius:3,padding:'2px 4px',cursor:'pointer',fontSize:11,lineHeight:1}}>✏️</button>
                    <button onClick={()=>deleteJob(j)} title="ลบ" style={{background:'#FFEDED',border:'2px solid #CC0000',borderRadius:3,padding:'2px 4px',cursor:'pointer',fontSize:11,lineHeight:1}}>🗑</button>
                  </div>
                </div>
                <div style={{fontWeight:700,fontSize:14,marginTop:4,cursor:'pointer',color:'#181018'}} onClick={()=>onNav('jobDetail',j)}>{j.customerName}</div>
                <div style={{color:'#888',fontSize:12}}>{j.jobType}{j.location?` · ${j.location}`:''}</div>
              </div>
            ))}

            {/* Google Calendar events */}
            {selData.gcal.map(e=>(
              <div key={e.id} style={{padding:'10px 0',borderBottom:'1px solid #d8c8a0'}}>
                <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}>
                  <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,background:'#3860D0',color:'#fff',padding:'2px 5px',borderRadius:2}}>📅 GCAL</span>
                  {e.time&&<span style={{fontSize:11,color:'#3860D0',fontWeight:600}}>🕐 {e.time}</span>}
                </div>
                <div style={{fontWeight:700,fontSize:14,color:'#181018'}}>{e.title}</div>
                {e.location&&<div style={{color:'#888',fontSize:12}}>📍 {e.location}</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ══ ALL MONTH QUESTS (ไม่ต้องคลิกวัน) ══ */}
      {(()=>{
        const allMonthJobs=[...jobs].filter(j=>{const d=new Date(j.date);return d.getFullYear()===yr&&d.getMonth()===mo;}).sort((a,b)=>new Date(a.date)-new Date(b.date));
        const allMonthGcal=[...gcalEvents].sort((a,b)=>a.date.localeCompare(b.date));
        if(allMonthJobs.length===0&&allMonthGcal.length===0)return null;
        return(
          <div style={{padding:'12px 16px 0'}}>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'#FFD700',marginBottom:4}}>⚔️ QUESTS THIS MONTH</div>
            <div style={{fontSize:11,color:'#aaa',marginBottom:10,fontFamily:'system-ui'}}>คิวงานทั้งหมดในเดือน {TH_M[mo]}</div>
            <div className="px-card" style={{padding:14}}>
              {allMonthJobs.map(j=>(
                <div key={j.id} style={{padding:'10px 0',borderBottom:'1px solid #d8c8a0'}}>
                  <div className="row-bet" style={{marginBottom:4}}>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,color:'#888'}}>{j.date}</span>
                      <TypeBadge type={j.customerType}/>
                      {j.calEventId&&<span style={{fontSize:11}}>📅</span>}
                    </div>
                    <div style={{display:'flex',gap:4,alignItems:'center'}}>
                      <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#CC0000'}}>{fc(j.totalAmount)}</span>
                      <button onClick={()=>onNav('jobDetail',j)} title="แก้ไข" style={{background:'#EBF3FF',border:'2px solid #3860D0',borderRadius:3,padding:'2px 4px',cursor:'pointer',fontSize:10}}>✏️</button>
                      <button onClick={()=>deleteJob(j)} title="ลบ" style={{background:'#FFEDED',border:'2px solid #CC0000',borderRadius:3,padding:'2px 4px',cursor:'pointer',fontSize:10}}>🗑</button>
                    </div>
                  </div>
                  <div style={{fontWeight:700,fontSize:14,color:'#181018',cursor:'pointer'}} onClick={()=>onNav('jobDetail',j)}>{j.customerName}</div>
                  <div style={{color:'#888',fontSize:12}}>{j.jobType}{j.location?` · ${j.location}`:''}</div>
                </div>
              ))}
              {showGcal&&allMonthGcal.map(e=>(
                <div key={e.id} style={{padding:'10px 0',borderBottom:'1px solid #d8c8a0'}}>
                  <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}>
                    <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,background:'#3860D0',color:'#fff',padding:'2px 5px',borderRadius:2}}>📅 GCAL</span>
                    <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:6,color:'#888'}}>{e.date}</span>
                    {e.time&&<span style={{fontSize:11,color:'#3860D0',fontWeight:600}}>🕐 {e.time}</span>}
                  </div>
                  <div style={{fontWeight:700,fontSize:14,color:'#181018'}}>{e.title}</div>
                  {e.location&&<div style={{color:'#888',fontSize:12}}>📍 {e.location}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════
   CUSTOMERS
   ══════════════════════════════════════════ */
function CustomersList({customers,setCustomers,jobs,onNav}){
  const[search,setSearch]=useState('');
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({name:'',type:'B2C',phone:'',lineId:'',taxId:'',address:''});
  const stats=useCallback(cid=>{const cj=jobs.filter(j=>j.customerId===cid);return{count:cj.length,total:cj.reduce((s,j)=>s+j.totalAmount,0)};},[jobs]);
  const filtered=[...customers].filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||(c.phone||'').includes(search)).sort((a,b)=>stats(b.id).total-stats(a.id).total);

  return(
    <div className="screen">
      <TopBar title="TRAINERS" titleTh="รายชื่อทีมงาน" onAdd={()=>setShowAdd(true)}/>
      <div style={{padding:'0 16px'}}>
        <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'#888',marginBottom:8}}>{customers.length} TRAINERS REGISTERED</div>
        <input placeholder="🔍 ค้นหา ชื่อ · เบอร์ · LINE" value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:12}}/>
        {filtered.map(c=>{
          const{count,total}=stats(c.id);const pt=POKE_TYPES[c.type]||POKE_TYPES.B2C;
          const init=c.name.trim().split(' ').slice(0,2).map(s=>s[0]||'').join('').toUpperCase()||c.name.slice(0,2).toUpperCase();
          return(
            <div key={c.id} className="job-card" onClick={()=>onNav('customerDetail',c)} style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:44,height:44,borderRadius:4,background:pt.bg,border:`3px solid ${pt.color}`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Press Start 2P',monospace",fontWeight:700,color:pt.color,fontSize:12,flexShrink:0}}>
                {init}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div className="row" style={{gap:6,flexWrap:'wrap',marginBottom:2}}>
                  <span style={{fontWeight:700,fontSize:14}}>{c.name}</span>
                  <TypeBadge type={c.type}/>
                </div>
                <div style={{color:'#888',fontSize:12}}>{count} quests · {fc(total)}</div>
              </div>
              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:'#FFD700',flexShrink:0}}>{shortK(total)}</div>
            </div>
          );

/* ══════════════════════════════════════════
   TAX REPORT
   ══════════════════════════════════════════ */
function TaxReport({jobs,payments,quotes}){
  const[yr,setYr]=useState(new Date().getFullYear());
  const[filter,setFilter]=useState('all');
  const yj=jobs.filter(j=>new Date(j.date).getFullYear()===yr&&(filter==='all'||j.customerType===filter));
  const yp=payments.filter(p=>{const j=jobs.find(x=>x.id===p.jobId);return j&&new Date(j.date).getFullYear()===yr&&(filter==='all'||j.customerType===filter);});
  const yq=quotes.filter(q=>{const j=jobs.find(x=>x.id===q.jobId);return j&&new Date(j.date).getFullYear()===yr&&(filter==='all'||j.customerType===filter);});
  const tSales=yj.reduce((s,j)=>s+j.totalAmount,0);
  const tRecv=yp.reduce((s,p)=>s+p.amount,0);
  const tVat=yq.filter(q=>q.useVat).reduce((s,q)=>s+q.items.reduce((a,i)=>a+i.amount,0)*VAT,0);
  const tWht=yq.filter(q=>q.useWht).reduce((s,q)=>s+q.items.reduce((a,i)=>a+i.amount,0)*WHT,0);

  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify({year:yr+543,summary:{tSales,tRecv,tVat,tWht},jobs:yj,payments:yp,quotes:yq},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`pixory-${yr+543}.json`;a.click();
  };

  return(
    <div className="screen">
      <div style={{padding:'14px 16px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <span className="sec-title" style={{margin:0}}>📊 GUILD HALL</span>
          <div style={{fontSize:10,color:'#aaa',marginTop:2,fontFamily:'system-ui,sans-serif'}}>บัญชีรายรับ</div>
        </div>
        <div className="row" style={{gap:6}}>
          <button onClick={()=>setYr(y=>y-1)} className="icon-btn" style={{width:28,height:28,fontSize:14}}>‹</button>
          <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#FFD700',minWidth:60,textAlign:'center'}}>{yr+543}</span>
          <button onClick={()=>setYr(y=>y+1)} className="icon-btn" style={{width:28,height:28,fontSize:14}}>›</button>
        </div>
      </div>
      <div style={{padding:'0 16px'}}>
        <div className="g2" style={{marginBottom:12}}>
          <KpiCard label="📦 ยอดขาย" value={fc(tSales)}/>
          <KpiCard label="💰 รับแล้ว" value={fc(tRecv)} color="#00C830"/>
          <KpiCard label="🧾 VAT" value={fc(tVat)} color="#3860D0"/>
          <KpiCard label="📋 WHT" value={fc(tWht)} color="#F08030"/>
        </div>
        <div className="pill-row" style={{marginBottom:12}}>
          {[['all','ALL'],['B2C','บุคคล'],['B2B','บริษัท']].map(([k,l])=>(
            <button key={k} className={`pill ${filter===k?'pill-active':'pill-inactive'}`} onClick={()=>setFilter(k)} style={{fontFamily:"'Press Start 2P',monospace",fontSize:7}}>{l}</button>
          ))}
        </div>
        <button className="px-btn px-btn-red" onClick={exportJSON} style={{marginBottom:12,fontSize:8}}>💾 EXPORT DATA</button>
        {tVat>0&&(
          <div className="px-card" style={{marginBottom:12,padding:14}}>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#181018',marginBottom:10}}>ภ.พ.30 · VAT REPORT</div>
            {Array(12).fill(0).map((_, i)=>{
              const v=yq.filter(q=>q.useVat).reduce((s,q)=>{const j=jobs.find(x=>x.id===q.jobId);return j&&new Date(j.date).getMonth()===i?s+q.items.reduce((a,x)=>a+x.amount,0)*VAT:s;},0);
              return v>0?(
                <div key={i} className="row-bet" style={{padding:'6px 0',borderBottom:'1px solid #d8c8a0',fontSize:13}}>
                  <span style={{color:'#555'}}>{TH_MS[i]} {yr+543}</span>
                  <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:9}}>{fc(v)}</span>
                </div>
              ):null;
            })}
          </div>
        )}
        {/* PIT Helper */}
        <div className="px-card" style={{padding:14,border:'3px solid #C8A020',boxShadow:'4px 4px 0 #C8A020'}}>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#181018',marginBottom:4}}>🧮 PIT HELPER</div>
          <div style={{fontSize:11,color:'#888',marginBottom:12}}>ภ.ง.ด.90/94 · คำนวณภาษีปลายปี</div>
          {[['รายได้รวม',tSales,'#181018'],['หัก 60%',-(tSales*.6),'#38A050'],['เงินได้สุทธิ',tSales*.4,'#CC0000']].map(([l,v,c])=>(
            <div key={l} className="row-bet" style={{marginBottom:6,fontSize:13}}>
              <span style={{color:'#555'}}>{l}</span>
              <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:9,color:c}}>{v<0?`-${fc(-v)}`:fc(v)}</span>
            </div>
          ))}
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'#aaa',marginTop:8,lineHeight:1.8}}>* ประมาณการเท่านั้น</div>
        </div>
      </div>
    </div>
  );
}

function SettingsScreen({user,jobs,customers,quotes,payments,setJobs,setCustomers,setQuotes,setPayments,onBack,onLogout,isDemoMode}){
  const[configText,setConfigText]=useLS('px_firebase_config','');
  const[showConfig,setShowConfig]=useState(false);

  const exportAll=()=>{
    const blob=new Blob([JSON.stringify({v:3,exportedAt:new Date().toISOString(),jobs,customers,quotes,payments},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`bestpart-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  };
  const importAll=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.jobs)setJobs(d.jobs);if(d.customers)setCustomers(d.customers);if(d.quotes)setQuotes(d.quotes);if(d.payments)setPayments(d.payments);alert('Import สำเร็จ ✓');}catch{alert('ไฟล์ไม่ถูกต้อง');}};r.readAsText(f);
  };
  const clearAll=()=>{if(!confirm('ลบข้อมูลทั้งหมด?'))return;setJobs([]);setCustomers([]);setQuotes([]);setPayments([]);alert('ล้างแล้ว');};

  return(

              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#FFD700',marginBottom:3}}>{(user.name||'').split(' ')[0]}</div>

            </div>
            <button className="px-btn px-btn-dark" style={{width:'auto',padding:'8px 12px',fontSize:7,flexShrink:0}} onClick={onLogout}>LOGOUT</button>
          </div>
        )}

        {/* Firebase Status */}
        <div className="px-card" style={{marginBottom:12,padding:14,border:`3px solid ${window.__db?'#38A050':'#CC0000'}`,boxShadow:`4px 4px 0 ${window.__db?'#38A050':'#CC0000'}`}}>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:window.__db?'#38A050':'#CC0000',marginBottom:6}}>
            {isDemoMode?'⚡ DEMO MODE':(window.__db?'🔥 FIREBASE CONNECTED':'⚠ ไม่ได้เชื่อมต่อ Firebase')}
          </div>
          <div style={{fontSize:11,color:'#888',marginBottom:10}}>
            {isDemoMode?'ข้อมูลไม่ sync — ใช้ทดลองเท่านั้น':
             window.__db?'ข้อมูลบันทึกบน Cloud อัตโนมัติ รองรับหลายคน':'กรุณาตั้งค่า Firebase Config'}
          </div>
          {!isDemoMode&&<button className="px-btn px-btn-dark" style={{fontSize:7}} onClick={()=>setShowConfig(true)}>⚙ แก้ไข Firebase Config</button>}
        </div>

        {/* iPhone install */}
        <div className="px-card" style={{marginBottom:12,padding:14,border:'3px solid #3860D0',boxShadow:'4px 4px 0 #3860D0'}}>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#3860D0',marginBottom:8}}>📱 ติดตั้งบน iPhone</div>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:7,color:'#555',lineHeight:2.5}}>
            1. เปิดใน Safari<br/>
            2. แตะปุ่ม Share (□↑)<br/>
            3. เลือก Add to Home Screen<br/>

  );

/* ══════════════════════════════════════════
   APP ROOT (Firebase Edition)
   ══════════════════════════════════════════ */
function App(){
  const[uid,setUid]=useState(null);
  const[user,setUser]=useState(null);
  const[accessToken,setAccessToken]=useState(null);
  const[isLoggedIn,setIsLoggedIn]=useState(false);
  const[isDemoMode,setIsDemoMode]=useState(false);
  const[loadingAuth,setLoadingAuth]=useState(!!window.__auth);
  const[screen,setScreen]=useState('dashboard');
  const[ctx,setCtx]=useState({job:null,customer:null,quote:null});

  /* Firebase Auth state listener */
  useEffect(()=>{
    if(!window.__auth){setLoadingAuth(false);return;}
    const unsub=window.__auth.onAuthStateChanged(u=>{
      setLoadingAuth(false);
      if(u&&!isDemoMode){
        setUid(u.uid);
        setUser({name:u.displayName,email:u.email,picture:u.photoURL,uid:u.uid});
        setIsLoggedIn(true);
      }
    });
    return()=>unsub();
  },[]);

  /* Firestore per-user data (or demo data when isDemoMode) */
  const fsUid=isDemoMode?null:uid;
  const[jobs,setJobs]=useFirestore(fsUid,'jobs',isDemoMode?DEMO_J:[]);
  const[customers,setCustomers]=useFirestore(fsUid,'customers',isDemoMode?DEMO_C:[]);
  const[quotes,setQuotes]=useFirestore(fsUid,'quotes',isDemoMode?DEMO_Q:[]);
  const[payments,setPayments]=useFirestore(fsUid,'payments',isDemoMode?DEMO_P:[]);

  const nav=(s,data)=>{
    setScreen(s);
    if(data){
      if(s==='jobDetail')setCtx(c=>({...c,job:data}));
      else if(s==='customerDetail')setCtx(c=>({...c,customer:data}));
      else if(s==='quoteDetail')setCtx(c=>({...c,quote:data}));
    }
  };

  const login=(data)=>{
    setUser(data.user);setUid(data.user.uid);
    if(data.accessToken)setAccessToken(data.accessToken);
    setIsLoggedIn(true);
  };
  const demo=()=>{setIsDemoMode(true);setIsLoggedIn(true);};
  const logout=async()=>{
    if(window.__auth&&!isDemoMode){try{await window.__auth.signOut();}catch(e){}}
    setUid(null);setUser(null);setAccessToken(null);
    setIsLoggedIn(false);setIsDemoMode(false);setScreen('dashboard');
  };

  const liveJob=ctx.job?jobs.find(j=>j.id===ctx.job.id)||ctx.job:null;

  /* Loading spinner ขณะรอ Firebase Auth */
  if(loadingAuth)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16}}>
      <div className="pokeball-anim">
        <svg width="64" height="64" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="96" fill="#CC0000" stroke="#181018" strokeWidth="8"/>
          <path d="M4,100 A96,96,0,0,1,196,100" fill="#F8F8F8"/>
          <rect x="4" y="88" width="192" height="24" fill="#181018"/>
          <circle cx="100" cy="100" r="24" fill="#F8F8F8" stroke="#181018" strokeWidth="8"/>
        </svg>
      </div>
      <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:'#888'}}>LOADING...</div>
    </div>
  );

  if(!isLoggedIn)return <LoginScreen onLogin={login} onDemo={demo}/>;

  const render=()=>{
    switch(screen){
      case 'dashboard':      return <Dashboard jobs={jobs} payments={payments} user={user} onNav={nav} onLogout={logout}/>;
      case 'jobs':           return <JobsList jobs={jobs} payments={payments} setJobs={setJobs} customers={customers} accessToken={accessToken} onNav={nav}/>;
      case 'jobDetail':      return <JobDetail job={liveJob} jobs={jobs} setJobs={setJobs} payments={payments} setPayments={setPayments} quotes={quotes} setQuotes={setQuotes} customers={customers} accessToken={accessToken} onBack={()=>setScreen('jobs')} onNav={nav}/>;
      case 'quotes':         return <QuotesList quotes={quotes} onNav={nav}/>;
      case 'quoteDetail':    return <QuoteDetail quote={ctx.quote} onBack={()=>setScreen(ctx.job?'jobDetail':'quotes')}/>;
      case 'calendar':       return <CalendarView jobs={jobs} setJobs={setJobs} accessToken={accessToken} onNav={nav}/>;
      case 'customers':      return <CustomersList customers={customers} setCustomers={setCustomers} jobs={jobs} onNav={nav}/>;
      case 'customerDetail': return <CustomerDetail customer={ctx.customer} jobs={jobs} payments={payments} onBack={()=>setScreen('customers')}/>;
      case 'tax':            return <TaxReport jobs={jobs} payments={payments} quotes={quotes}/>;
      case 'settings':       return <SettingsScreen user={user} jobs={jobs} customers={customers} quotes={quotes} payments={payments} setJobs={setJobs} setCustomers={setCustomers} setQuotes={setQuotes} setPayments={setPayments} onBack={()=>setScreen('dashboard')} onLogout={logout} isDemoMode={isDemoMode}/>;
      default: return null;
    }
  };

  return(
    <div className="app">
      {isDemoMode&&<div style={{background:'#C8A020',color:'#181018',textAlign:'center',fontFamily:"'Press Start 2P',monospace",fontSize:6,padding:'6px',position:'sticky',top:0,zIndex:99,letterSpacing:.5}}>⚡ DEMO MODE — ข้อมูลไม่ได้บันทึก Cloud</div>}
      {render()}
      <BottomNav screen={screen} onNav={nav}/>
      {MAIN.includes(screen)&&(
        <button onClick={()=>setScreen('settings')} style={{position:'fixed',top:14,right:'calc(50% - 207px)',zIndex:99,background:'none',border:'none',color:'#666',fontSize:18,cursor:'pointer',fontFamily:"'Press Start 2P',monospace"}}>⚙</button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
